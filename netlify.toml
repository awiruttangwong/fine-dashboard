[build]
  publish = "."

[[headers]]
  for = "/*"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"
    X-Content-Type-Options = "nosniff"
    X-Frame-Options = "DENY"
    Referrer-Policy = "strict-origin-when-cross-origin"

# .netlifyignore does not prevent these paths from being uploaded/served by
# `netlify deploy`, so block them at routing level instead: backend source,
# the separately-copied driver-debt module, backups, and dev tooling must
# never be reachable from the public site.
[[redirects]]
  from = "/backend/*"
  to = "/index.html"
  status = 404
  force = true

[[redirects]]
  from = "/tools/*"
  to = "/index.html"
  status = 404
  force = true

[[redirects]]
  from = "/docs/PRODUCTION-RELEASE-CHECKLIST.md"
  to = "/index.html"
  status = 404
  force = true

[[redirects]]
  from = "/docs/*"
  to = "/index.html"
  status = 404
  force = true

[[redirects]]
  from = "/backup_fine_P'BOY/*"
  to = "/index.html"
  status = 404
  force = true

[[redirects]]
  from = "/Dashboard*"
  to = "/index.html"
  status = 404
  force = true

[[redirects]]
  from = "/code*"
  to = "/index.html"
  status = 404
  force = true

# Apps Script source and project manifests live at the repo root, so the
# /backend/* rule above does not cover them. Netlify only matches exact
# paths and trailing /* splats — an extension glob such as "/*.gs" silently
# matches nothing — so each root file is listed by name. The app only loads
# icons/, css/ and js/ at runtime, so none of this is needed to serve it.
[[redirects]]
  from = "/Code.gs"
  to = "/index.html"
  status = 404
  force = true

[[redirects]]
  from = "/appsscript.json"
  to = "/index.html"
  status = 404
  force = true

[[redirects]]
  from = "/.clasp.json"
  to = "/index.html"
  status = 404
  force = true

[[redirects]]
  from = "/README.md"
  to = "/index.html"
  status = 404
  force = true

[[redirects]]
  from = "/references/*"
  to = "/index.html"
  status = 404
  force = true

[[redirects]]
  from = "/*.xlsx"
  to = "/index.html"
  status = 404
  force = true

[[redirects]]
  from = "/*.txt"
  to = "/index.html"
  status = 404
  force = true
